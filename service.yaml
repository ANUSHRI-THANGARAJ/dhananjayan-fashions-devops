# Kubernetes Service for Dhananjayan Fashions backend
# Exposes the app on port 3000
apiVersion: v1
kind: Service
metadata:
  name: dhanan-fashions-service
spec:
  selector:
    app: dhanan-fashions
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: LoadBalancer # for cloud clusters; use NodePort for local minikube/kind if needed
